<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
      .cart-thumb {
          width: 72px; height: 56px; border-radius: 4px;
          object-fit: cover; background: var(--card-bg); display: block; flex-shrink: 0;
      }
      .qty-control {
          display: inline-flex; align-items: center;
          border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
      }
      .qty-btn {
          width: 28px; height: 28px; border: none; background: none;
          font-size: 16px; cursor: pointer; color: var(--fg);
          display: flex; align-items: center; justify-content: center;
      }
      .qty-num {
          width: 32px; text-align: center; font-size: 13px;
          font-family: var(--font-body); border: none;
          border-left: 1px solid var(--border); border-right: 1px solid var(--border);
          outline: none; background: none;
          -moz-appearance: textfield;
      }
      .qty-num::-webkit-outer-spin-button,
      .qty-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

      .cart-row {
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 14px 0;
          border-bottom: 1px solid var(--border);
          flex-wrap: wrap;
      }
      .cart-row-name {
          flex: 1;
          min-width: 80px;
      }
      .cart-row-name h2 { margin: 0; }
      .cart-row-controls {
          display: flex;
          align-items: center;
          gap: 12px;
          flex-shrink: 0;
      }
      .cart-row-price { margin: 0; white-space: nowrap; }
  </style>
</head>

<body class="d-flex flex-column" style="min-height:100vh">

  <!-- Header -->
  <nav class="navbar px-4 py-2 border-bottom sticky-top bg-white d-flex justify-content-between">
    <a href="home.html"><img src="../images/home/logo.png" alt="DSgallery" style="max-height:40px"/></a>
    <div class="d-flex align-items-center gap-2">
      <div class="search-wrap">
        <input type="text" placeholder="Search"/>
        <img class="icon-search" src="../icons/search.svg" alt=""/>
      </div>
      <a class="icon-btn active" href="cart.html"><img src="../icons/cart.svg" alt="Cart"/></a>
      <a class="icon-btn" href="saved.html"><img src="../icons/bookmark.svg" alt="Saved"/></a>
      <a class="log-btn" href="login.html">Log in</a>
      <a class="log-btn" href="register.html">Register</a>
    </div>
  </nav>

  <!-- Body -->

    <!-- Sidebar -->

        <a class="side-link" href="artworks.html">Artworks</a>

        <div class="row col-md-1 gap-1">

        </div>

      <div class="row gx-3 align-items-center py-3 border-bottom">

        </div>

      <div class="row gx-3 align-items-center py-3">
        <div class="col-auto col-md-1">

        </div>

          <h2>Interior of a Restaurant</h2>
        </div>
        <div class="col-auto col-md-3">
          <div class="qty-control">

      <div class="mt-4 border-top pt-3">

          <span style="font-size:22px;font-weight:500;font-family:var(--font-display)">4 579€</span>
        </div>
        <div class="d-flex justify-content-end">
          <a class="order-btn" href="shipping.html">Continue to shipping</a>

      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="d-flex align-items-center gap-3 py-3 border-top" style="background:var(--card-bg); padding-left:1.5rem; padding-right:1.5rem">
    <div class="d-flex gap-3">
      <a href="#" class="opacity-50"><img src="../icons/twitter.svg" alt="Twitter" style="width:15px; height:15px"/></a>

    <p class="mb-0 text-muted small">© 2026 DSgallery. All rights reserved.</p>
  </footer>


</body>
</html>
